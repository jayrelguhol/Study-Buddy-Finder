<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Study Buddy Finder</title>
    <script>
        if (localStorage.getItem('studybuddy_darkMode') === 'true') {
            document.documentElement.dataset.theme = 'dark';
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="dashboard">
    <header class="site-header">
        <div class="container header-shell">
            <a href="dashboard.html" class="brand">
                <span class="brand-mark" aria-hidden="true">
                    <span class="brand-book"></span>
                    <span class="brand-book brand-book-right"></span>
                    <span class="brand-dot"></span>
                </span>
                <span>Study Buddy Finder</span>
            </a>
            <nav id="global-nav" class="top-nav" aria-label="Primary navigation">
                <a href="dashboard.html" data-nav="dashboard">Dashboard</a>
                <a href="subjects.html" data-nav="subjects">Subjects</a>
                <a href="matches.html" data-nav="matches">Matches</a>
                <a href="schedule.html" data-nav="schedule">Schedule</a>
                <a href="profile.html" data-nav="profile">Profile</a>
            </nav>
            <div class="header-actions" aria-label="Quick actions">
                <button type="button" id="dark-toggle" class="icon-btn header-action-btn" aria-label="Toggle theme">Theme</button>
                <button type="button" id="logout-btn" class="secondary-btn compact-btn header-action-btn">Logout</button>
            </div>
        </div>
    </header>

    <main class="container page-shell">
        <section class="card dashboard-hero">
            <div>
                <p class="eyebrow">Overview</p>
                <h1>Welcome, <span id="user-name"></span></h1>
                <p id="user-info" class="lead"></p>
            </div>
            <a href="subjects.html" class="secondary-link">Update subjects and availability</a>
        </section>

        <section class="stats-grid">
            <article class="stat-card">
                <h2 id="matches-count">0</h2>
                <p>Matches</p>
            </article>
            <article class="stat-card">
                <h2 id="schedules-count">0</h2>
                <p>Upcoming sessions</p>
            </article>
            <article class="stat-card">
                <h2 id="unread-count">0</h2>
                <p>Messages</p>
            </article>
        </section>

        <section class="card">
            <div class="section-heading">
                <div>
                    <p class="eyebrow">Next step</p>
                    <h2>Keep your profile ready for matching</h2>
                </div>
            </div>
            <div id="dashboard-summary" class="empty-state"></div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="common.js"></script>
    <script src="app-core.js"></script>
    <script src="dashboard-page.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const nameEl = document.getElementById('user-name');
            if (!nameEl || nameEl.textContent.trim()) return;

            try {
                const currentUsername = localStorage.getItem('studybuddy_currentUser') || '';
                const users = JSON.parse(localStorage.getItem('studybuddy_users') || '[]');
                const currentUser = Array.isArray(users)
                    ? users.find((user) => String(user.username || '') === currentUsername)
                    : null;
                const fullName = String(currentUser?.fullName || currentUser?.full_name || currentUser?.username || 'Student').trim();
                const firstName = fullName.split(/\s+/).filter(Boolean)[0] || 'Student';
                nameEl.textContent = firstName;
            } catch (error) {
                nameEl.textContent = 'Student';
            }
        });
    </script>
</body>
</html>
