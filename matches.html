<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matches - Study Buddy Finder</title>
    <script>
        if (localStorage.getItem('studybuddy_darkMode') === 'true') {
            document.documentElement.dataset.theme = 'dark';
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="matches">
    <header class="site-header">
        <div class="container header-shell">
            <a href="dashboard.html" class="brand">
                <span class="brand-mark" aria-hidden="true">
                    <span class="brand-book"></span>
                    <span class="brand-book brand-book-right"></span>
                    <span class="brand-dot"></span>
                </span>
                <span>Study Buddy Finder</span>
            </a>
            <nav id="global-nav" class="top-nav" aria-label="Primary navigation">
                <a href="dashboard.html" data-nav="dashboard">Dashboard</a>
                <a href="subjects.html" data-nav="subjects">Subjects</a>
                <a href="matches.html" data-nav="matches">Matches</a>
                <a href="schedule.html" data-nav="schedule">Schedule</a>
                <a href="profile.html" data-nav="profile">Profile</a>
            </nav>
            <div class="header-actions" aria-label="Quick actions">
                <button type="button" id="dark-toggle" class="icon-btn header-action-btn" aria-label="Toggle theme">Theme</button>
                <button type="button" id="logout-btn" class="secondary-btn compact-btn header-action-btn">Logout</button>
            </div>
        </div>
    </header>

    <main class="container page-shell">
        <section class="card">
            <div class="section-heading">
                <div>
                    <p class="eyebrow">Study partners</p>
                    <h1>Your Matches</h1>
                </div>
            </div>
            <section class="match-subject-panel" aria-labelledby="match-subject-title">
                <div class="section-heading compact-heading">
                    <div>
                        <p class="eyebrow">Find by subject</p>
                        <h2 id="match-subject-title">Priority matches</h2>
                    </div>
                </div>
                <p id="match-subject-note" class="topics-selection-note">Upload a subject from the subjects page first, then your match results will appear here.</p>
                <a href="subjects.html?mode=new" class="secondary-link select-subject-again">Upload another subject for matching</a>
            </section>
            <div id="matches-list" class="list-grid"></div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="common.js"></script>
    <script src="script.js"></script>
</body>
</html>
