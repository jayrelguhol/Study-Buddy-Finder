<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule - Study Buddy Finder</title>
    <script>
        if (localStorage.getItem('studybuddy_darkMode') === 'true') {
            document.documentElement.dataset.theme = 'dark';
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="schedule">
    <header class="site-header">
        <div class="container header-shell">
            <a href="dashboard.html" class="brand">
                <span class="brand-mark" aria-hidden="true">
                    <span class="brand-book"></span>
                    <span class="brand-book brand-book-right"></span>
                    <span class="brand-dot"></span>
                </span>
                <span>Study Buddy Finder</span>
            </a>
            <nav id="global-nav" class="top-nav" aria-label="Primary navigation">
                <a href="dashboard.html" data-nav="dashboard">Dashboard</a>
                <a href="subjects.html" data-nav="subjects">Subjects</a>
                <a href="matches.html" data-nav="matches">Matches</a>
                <a href="schedule.html" data-nav="schedule">Schedule</a>
                <a href="profile.html" data-nav="profile">Profile</a>
            </nav>
            <div class="header-actions" aria-label="Quick actions">
                <button type="button" id="dark-toggle" class="icon-btn header-action-btn" aria-label="Toggle theme">Theme</button>
                <button type="button" id="logout-btn" class="secondary-btn compact-btn header-action-btn">Logout</button>
            </div>
        </div>
    </header>

    <main class="container page-shell">
        <section class="card">
            <div class="section-heading">
                <div>
                    <p class="eyebrow">Plan a session</p>
                    <h1>Schedule Study Session</h1>
                </div>
            </div>
            <form id="schedule-form" class="stack-form">
                <div class="form-group">
                    <label for="schedule-match">Study Partner</label>
                    <p id="schedule-partner-note" class="topics-selection-note">Choose who you want to schedule with first.</p>
                    <div id="schedule-partners" class="schedule-partners-grid"></div>
                    <select id="schedule-match" class="subjects-select-native" required></select>
                </div>
                <div id="schedule-time-group" class="form-group is-hidden">
                    <label for="schedule-time">Date and Time</label>
                    <input type="datetime-local" id="schedule-time" disabled>
                </div>
                <button id="schedule-submit-btn" type="submit" class="is-hidden">Save Schedule</button>
            </form>
        </section>

        <section class="card">
            <div class="section-heading">
                <div>
                    <p class="eyebrow">Planned sessions</p>
                    <h2>Upcoming Sessions</h2>
                </div>
            </div>
            <div id="schedules-list" class="list-grid"></div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="common.js"></script>
    <script src="app-core.js"></script>
    <script src="schedule-page.js"></script>
</body>
</html>
